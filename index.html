<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeenGovernment Bill Tracker</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: linear-gradient(to bottom, #f4f4f4, #e9e9e9);
        }

        /* HEADER */
        header {
            background: repeating-linear-gradient(
                135deg,
                #000000,
                #000000 40px,
                #f2e94e 40px,
                #f2e94e 80px
            );
            padding: 25px 20px;
            text-align: center;
            color: white;
            border-bottom: 4px solid #000;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .flag {
            width: 55px;
            height: 55px;
            border-radius: 6px;
            border: 2px solid white;
        }

        .title {
            font-size: 28px;
            font-weight: 800;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
        }

        .subtitle {
            font-size: 14px;
            margin-top: 6px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }

        /* CONTAINER */
        .container {
            padding: 25px;
            max-width: 850px;
            margin: auto;
        }

        /* BILL CARDS */
        .bill {
            background: white;
            padding: 18px;
            margin-bottom: 14px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
            border-left: 6px solid #f2e94e;
            transition: 0.25s;
        }

        .bill:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.18);
        }

        .bill a {
            text-decoration: none;
            color: #111;
            font-size: 19px;
            font-weight: 600;
            display: block;
        }

        .bill a:hover {
            color: #000;
        }

        /* OPTIONAL SMALL DECOR LINE */
        .divider {
            height: 3px;
            background: linear-gradient(to right, #000, #f2e94e, #000);
            margin: 20px 0;
            border-radius: 2px;
        }

    </style>
</head>

<body>

<header>
    <div class="header-top">
        <img src="flag.png" class="flag">
        <div class="title">T.G.L.R.O. — TeenGovernment Bill Tracker</div>
    </div>
    <div class="subtitle">
        TeenGovernment Legislative Records & Oversight Organization
    </div>
</header>

<div class="container">

    <div class="divider"></div>

    <!-- ADD YOUR BILLS BELOW -->

    <div class="bill">
        <a href="https://www.reddit.com/r/TeenGovernment/comments/1sio3li/digital_capital_punishment_act_v2/" target="_blank">
            Digital Capital Punishment Act V2
        </a>
    </div>

    <div class="bill">
        <a href="https://reddit.com/YOUR_LINK_HERE" target="_blank">
            Another Bill Name
        </a>
    </div>

</div>

</body>
</html>
